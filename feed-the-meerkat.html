  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

mat('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* Self-hosted brand display faces */\n@font-face {\n  font-family: 'Bowlby One SC';\n  src: url(\"92ae3544-d4e8-44b8-bc77-d5d9eb47b949\") format('truetype');\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n\n/* Self-hosted body face — Quicksand (Light→Bold) */\n@font-face {\n  font-family: 'Quicksand';\n  src: url(\"e8ec1fa2-cc03-4ebd-bffa-ca281b52404a\") format('truetype');\n  font-weight: 300;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: 'Quicksand';\n  src: url(\"fe9e6012-15e0-429b-9c5d-0275c1ad8b06\") format('truetype');\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: 'Quicksand';\n  src: url(\"50116208-46e4-4537-8ff5-b868eef63c5e\") format('truetype');\n  font-weight: 500;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: 'Quicksand';\n  src: url(\"fae9122c-fac3-44d7-aaaf-eea586e4526c\") format('truetype');\n  font-weight: 600;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: 'Quicksand';\n  src: url(\"59405ce5-56cc-4b6b-8a8a-a6627559e1c5\") format('truetype');\n  font-weight: 700;\n  font-style: normal;\n  font-display: swap;\n}\n\n:root {\n  /* ---------- COLOUR: Primary ---------- */\n  --pd-yellow:        #FFFF95;  /* pale lemon */\n  --pd-orange:        #FF931E;  /* bright orange */\n\n  /* ---------- COLOUR: Secondary ---------- */\n  --pd-sky:           #AEFBFF;  /* pale aqua */\n  --pd-teal:          #83EEA6;  /* signature mint green */\n\n  /* ---------- COLOUR: Accents ---------- */\n  --pd-coral:         #FDCDDC;  /* soft pink */\n  --pd-grape:         #DD316F;  /* rose / magenta (bold accent, light text) */\n  --pd-pink-bright:   #FF7BAC;  /* bright pink */\n  --pd-blue:          #3FA9F5;  /* sky blue */\n  --pd-green:         #7AC943;  /* leaf green */\n  --pd-red:           #FF1D25;  /* red (sparingly) */\n\n  /* ---------- COLOUR: Backgrounds ---------- */\n  --pd-cream:         #F9F8F4;  /* warm off-white — neutral page bg */\n  --pd-pale-blue:     #83EEA6;  /* mint green — vivid colour-block bg */\n  --pd-white:         #FFFFFF;\n  /* vivid full-bleed \"block\" backgrounds (brand swatches) */\n  --pd-bg-mint:       #83EEA6;\n  --pd-bg-aqua:       #AEFBFF;\n  --pd-bg-pink:       #FDCDDC;\n  --pd-bg-lemon:      #FFFF95;\n  --pd-bg-rose:       #DD316F;\n  --pd-bg-teal:       #02594E;\n  --pd-bg-teal-dk:    #004256;\n\n  /* ---------- COLOUR: Ink / text ---------- */\n  --pd-ink:           #02594E;  /* deep pine teal — bold text & outlines */\n  --pd-ink-soft:      #2C6A5E;  /* muted teal — secondary text */\n  --pd-paw:           #02594E;  /* paw-print / footprint (pine teal) */\n\n  /* ---------- COLOUR: tints (soft fills for cards/badges) ---------- */\n  --pd-yellow-tint:   #FCFCCB;\n  --pd-orange-tint:   #FFE6CC;\n  --pd-sky-tint:      #E6FEFF;\n  --pd-teal-tint:     #D6F8E2;\n  --pd-coral-tint:    #FDE7EF;\n  --pd-grape-tint:    #FBD6E3;\n\n  /* ---------- Semantic colour roles ---------- */\n  --pd-bg:            var(--pd-cream);\n  --pd-fg:            var(--pd-ink);\n  --pd-fg-muted:      var(--pd-ink-soft);\n  --pd-primary:       var(--pd-teal);     /* mint green leads */\n  --pd-primary-ink:   var(--pd-ink);      /* text on mint */\n  --pd-cta:           var(--pd-teal);\n  --pd-cta-ink:       var(--pd-ink);      /* dark teal text on mint */\n  --pd-link:          var(--pd-ink);\n\n  /* ---------- TYPE families ---------- */\n  --pd-font-display:  'Bowlby One SC', 'Baloo 2', system-ui, sans-serif;\n  --pd-font-body:     'Quicksand', 'Nunito', system-ui, sans-serif;\n\n  /* ---------- TYPE scale (large, screen-share friendly) ---------- */\n  --pd-text-hero:     72px;   /* slide hero title */\n  --pd-text-h1:       54px;\n  --pd-text-h2:       40px;\n  --pd-text-h3:       30px;\n  --pd-text-lead:     26px;   /* intro / lead body */\n  --pd-text-body:     22px;   /* default body */\n  --pd-text-small:    18px;   /* captions, labels */\n  --pd-text-badge:    18px;\n\n  --pd-weight-body:   500;\n  --pd-weight-strong: 800;\n  --pd-leading-tight: 1.1;\n  --pd-leading-body:  1.5;\n  --pd-tracking-head: 0.02em;\n\n  /* ---------- SPACING (8pt-ish, generous) ---------- */\n  --pd-space-1: 8px;\n  --pd-space-2: 16px;\n  --pd-space-3: 24px;\n  --pd-space-4: 32px;\n  --pd-space-5: 48px;\n  --pd-space-6: 64px;\n  --pd-space-7: 96px;\n\n  /* ---------- RADII (rounded, sticker-like) ---------- */\n  --pd-radius-sm:  12px;\n  --pd-radius-md:  20px;\n  --pd-radius-lg:  32px;\n  --pd-radius-xl:  44px;\n  --pd-radius-pill: 999px;\n\n  /* ---------- BORDERS (chunky, friendly outlines) ---------- */\n  --pd-border:      3px solid var(--pd-ink);\n  --pd-border-w:    3px;\n  --pd-border-thick: 4px solid var(--pd-ink);\n\n  /* ---------- SHADOWS (soft, slightly playful drop) ---------- */\n  --pd-shadow-sm:  0 4px 0 rgba(45,42,102,0.12);\n  --pd-shadow-md:  0 8px 0 rgba(45,42,102,0.14);\n  --pd-shadow-soft: 0 10px 28px rgba(45,42,102,0.18);\n  --pd-shadow-sticker: 0 6px 0 rgba(45,42,102,0.22);\n  /* layered \"pop\" shadow — chunky offset + soft ambient, for dimensional cards */\n  --pd-shadow-pop: 0 14px 0 rgba(45,42,102,0.12), 0 26px 50px rgba(45,42,102,0.24);\n\n  /* ---------- Playful tilts (apply to stickers/badges) ---------- */\n  --pd-tilt-l: -3deg;  /* @kind other */\n  --pd-tilt-r:  3deg;  /* @kind other */\n}\n\n/* ============================================================\n   BASE ELEMENT STYLES\n   ============================================================ */\n.pd-body, body.pd {\n  margin: 0;\n  background: var(--pd-bg);\n  color: var(--pd-fg);\n  font-family: var(--pd-font-body);\n  font-weight: var(--pd-weight-body);\n  font-size: var(--pd-text-body);\n  line-height: var(--pd-leading-body);\n  -webkit-font-smoothing: antialiased;\n}\n\n.pd-hero,\n.pd h1, h1.pd {\n  font-family: var(--pd-font-display);\n  font-weight: 800;\n  letter-spacing: var(--pd-tracking-head);\n  line-height: var(--pd-leading-tight);\n  color: var(--pd-fg);\n  margin: 0;\n}\n.pd-hero { font-size: var(--pd-text-hero); }\n.pd h1, h1.pd { font-size: var(--pd-text-h1); }\n\n.pd h2, h2.pd {\n  font-family: var(--pd-font-display);\n  font-weight: 800;\n  font-size: var(--pd-text-h2);\n  line-height: var(--pd-leading-tight);\n  letter-spacing: var(--pd-tracking-head);\n  margin: 0;\n}\n.pd h3, h3.pd {\n  font-family: var(--pd-font-display);\n  font-weight: 600;\n  font-size: var(--pd-text-h3);\n  margin: 0;\n}\n.pd p, p.pd { font-size: var(--pd-text-body); line-height: var(--pd-leading-body); margin: 0; }\n.pd-lead { font-size: var(--pd-text-lead); line-height: 1.45; }\n.pd-small { font-size: var(--pd-text-small); }\n\n/* ============================================================\n   COMPONENT PRIMITIVES\n   ============================================================ */\n\n/* Rounded card — the workhorse container */\n.pd-card {\n  background: var(--pd-white);\n  border: var(--pd-border);\n  border-radius: var(--pd-radius-lg);\n  box-shadow: var(--pd-shadow-soft);\n  padding: var(--pd-space-4);\n}\n\n/* Sticker badge — tilted, chunky outline */\n.pd-badge {\n  display: inline-flex;\n  align-items: center;\n  gap: var(--pd-space-1);\n  font-family: var(--pd-font-display);\n  font-weight: 600;\n  font-size: var(--pd-text-badge);\n  color: var(--pd-ink);\n  background: var(--pd-yellow);\n  border: var(--pd-border);\n  border-radius: var(--pd-radius-pill);\n  padding: 6px 16px;\n  box-shadow: var(--pd-shadow-sticker);\n  white-space: nowrap;\n  transform: rotate(var(--pd-tilt-l));\n}\n.pd-badge--sky   { background: var(--pd-sky); }\n.pd-badge--teal  { background: var(--pd-teal); color: var(--pd-ink); }\n.pd-badge--coral { background: var(--pd-coral); color: var(--pd-ink); }\n.pd-badge--grape { background: var(--pd-grape); color: #fff; }\n.pd-badge--tilt-r { transform: rotate(var(--pd-tilt-r)); }\n\n/* Primary button — Maggie-style chunky pill with solid teal drop-shadow */\n.pd-btn {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: var(--pd-space-1);\n  font-family: var(--pd-font-display);\n  font-weight: 400;\n  font-size: var(--pd-text-body);\n  text-transform: uppercase;\n  letter-spacing: 0.02em;\n  color: var(--pd-ink);\n  background: var(--pd-teal);\n  border: 3px solid var(--pd-ink);\n  border-radius: var(--pd-radius-pill);\n  padding: 16px 38px;\n  box-shadow: -3px 6px 0 var(--pd-ink);\n  white-space: nowrap;\n  cursor: pointer;\n  transition: transform 100ms ease, box-shadow 100ms ease;\n}\n.pd-btn:hover  { transform: translate(1px,-2px); box-shadow: -4px 9px 0 var(--pd-ink); }\n.pd-btn:active { transform: translate(-2px,5px); box-shadow: -1px 2px 0 var(--pd-ink); }\n.pd-btn--mint     { background: var(--pd-teal); }\n.pd-btn--aqua     { background: var(--pd-sky); }\n.pd-btn--pink     { background: var(--pd-coral); }\n.pd-btn--lavender { background: var(--pd-grape); }\n.pd-btn--yellow   { background: var(--pd-yellow); }\n.pd-btn--sky      { background: var(--pd-sky); }\n.pd-btn--rose     { background: var(--pd-grape); color: #fff; border-color: var(--pd-ink); box-shadow: -3px 6px 0 var(--pd-ink); }\n\n/* Speech bubble — for chatty narration / the cat talking */\n.pd-bubble {\n  position: relative;\n  display: inline-block;\n  background: var(--pd-white);\n  border: var(--pd-border);\n  border-radius: var(--pd-radius-lg);\n  padding: var(--pd-space-3) var(--pd-space-4);\n  box-shadow: var(--pd-shadow-soft);\n  font-family: var(--pd-font-body);\n  font-weight: 600;\n}\n.pd-bubble::after {\n  content: \"\";\n  position: absolute;\n  left: 42px; bottom: -18px;\n  width: 26px; height: 26px;\n  background: var(--pd-white);\n  border-right: var(--pd-border);\n  border-bottom: var(--pd-border);\n  border-bottom-right-radius: 6px;\n  transform: rotate(45deg);\n}\n\n/* Dotted trail — connect elements like footprints on a map */\n.pd-trail {\n  border: none;\n  border-top: 5px dotted var(--pd-orange);\n  margin: var(--pd-space-3) 0;\n}\n\n/* Tinted info panel */\n.pd-panel {\n  background: var(--pd-sky-tint);\n  border: var(--pd-border);\n  border-radius: var(--pd-radius-lg);\n  padding: var(--pd-space-4);\n}\n\n/* ============================================================\n   STORYBOOK POP — depth, scatter & motion utility layer\n   Bold colour-blocking, dimensional cards, confetti, big type.\n   Use on slides/posters where you want energy, not just tidiness.\n   ============================================================ */\n\n/* --- Big organic background blobs (layer behind content) --- */\n.pd-blob {\n  position: absolute;\n  border-radius: 46% 54% 58% 42% / 52% 44% 56% 48%;\n  z-index: 0;\n  pointer-events: none;\n}\n.pd-blob--yellow { background: var(--pd-yellow); }\n.pd-blob--orange { background: var(--pd-orange); }\n.pd-blob--sky    { background: var(--pd-sky); }\n.pd-blob--teal   { background: var(--pd-teal); }\n.pd-blob--coral  { background: var(--pd-coral); }\n.pd-blob--grape  { background: var(--pd-grape); }\n.pd-blob--ring   { background: transparent; border: 14px solid var(--pd-yellow); }\n\n/* A giant arch / sun peeking from an edge */\n.pd-arch {\n  position: absolute;\n  border-radius: 999px 999px 0 0;\n  z-index: 0;\n  pointer-events: none;\n}\n\n/* --- Dimensional pop card: thick outline + layered shadow --- */\n.pd-pop-card {\n  position: relative;\n  background: var(--pd-white);\n  border: 5px solid var(--pd-ink);\n  border-radius: var(--pd-radius-lg);\n  box-shadow: var(--pd-shadow-pop);\n  padding: var(--pd-space-4);\n  z-index: 2;\n}\n\n/* --- Multi-colour expressive display word helpers --- */\n.pd-word { font-family: var(--pd-font-display); font-weight: 800; line-height: 1.04; letter-spacing: 0.02em; display: inline-block; white-space: nowrap; }\n.pd-ink-stroke { -webkit-text-stroke: 4px var(--pd-ink); paint-order: stroke fill; }\n.pd-c-yellow { color: var(--pd-yellow); }\n.pd-c-orange { color: var(--pd-orange); }\n.pd-c-sky    { color: var(--pd-sky); }\n.pd-c-teal   { color: var(--pd-teal); }\n.pd-c-coral  { color: var(--pd-coral); }\n.pd-c-grape  { color: var(--pd-grape); }\n\n/* --- Confetti scatter --- *\n * Put .pd-confetti (absolutely-filling, z-index 1) inside a stage and let the\n * deck's confetti script populate it, OR drop .pd-cf children by hand. */\n.pd-confetti { position: absolute; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }\n.pd-cf { position: absolute; will-change: transform; }\n.pd-dot { border-radius: 999px; }\n\n/* --- Gentle, child-friendly motion --- */\n@keyframes pd-float   { 0%,100% { transform: translateY(0) rotate(var(--cf-rot,0deg)); } 50% { transform: translateY(-14px) rotate(calc(var(--cf-rot,0deg) + 8deg)); } }\n@keyframes pd-bob     { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }\n@keyframes pd-pop-in  { 0% { transform: scale(0.6) translateY(24px); opacity: 0; } 70% { transform: scale(1.06) translateY(-4px); opacity: 1; } 100% { transform: scale(1) translateY(0); opacity: 1; } }\n@keyframes pd-spin-slow { to { transform: rotate(360deg); } }\n\n.pd-anim-float { animation: pd-float 5s ease-in-out infinite; }\n.pd-anim-bob   { animation: pd-bob 4s ease-in-out infinite; }\n\n/* Staggered entrance — the deck adds .pd-enter to the active slide; children\n * with [data-pop] pop in one after another. Honours reduced-motion. */\n.pd-enter [data-pop] { opacity: 0; }\n.pd-enter.pd-go [data-pop] { animation: pd-pop-in 620ms cubic-bezier(.34,1.56,.64,1) both; }\n.pd-enter.pd-go [data-pop=\"2\"] { animation-delay: 110ms; }\n.pd-enter.pd-go [data-pop=\"3\"] { animation-delay: 220ms; }\n.pd-enter.pd-go [data-pop=\"4\"] { animation-delay: 330ms; }\n.pd-enter.pd-go [data-pop=\"5\"] { animation-delay: 440ms; }\n.pd-enter.pd-go [data-pop=\"6\"] { animation-delay: 550ms; }\n.pd-enter.pd-go [data-pop=\"7\"] { animation-delay: 660ms; }\n\n@media (prefers-reduced-motion: reduce) {\n  .pd-anim-float, .pd-anim-bob { animation: none; }\n  .pd-enter.pd-go [data-pop] { animation: none; opacity: 1; }\n}\n\n<\u002Fstyle>\n<style>/* ============================================================\n   LESSON 9 — \"Wild Files: Meet the Meerkat\" · KALAHARI SAFARI\n   A NEW information-text unit. Same Playful Detective layout\n   system as the space lessons (rounded cards, thick outlines,\n   soft drops, chunky Bowlby headings, pill badges, playful\n   tilts) — but a warm KALAHARI palette: sunset ambers, savanna\n   gold, acacia green, terracotta, sandy cream & deep meerkat\n   brown linework. Cheerful, storybook, never scary.\n   British English throughout.\n\n   Loads AFTER lesson5.css + lesson6.css and RE-SKINS them by\n   overriding the --sp-* tokens, so every structural class\n   (.pad .sp-card .eyebrow .item .roundel .mission .tip …) keeps\n   working but wears desert colours. New slide shells: .savanna,\n   .savanna-deep, .savanna-cream.\n   ============================================================ */\n\n:root {\n  /* ---- Kalahari working palette (re-skins the space tokens) ---- */\n  --sp-ink:      #4A2A12;   /* deep meerkat brown — outlines & text on light */\n  --sp-ink-soft: #6E4522;\n  --sp-cream:    #FBF1DC;   /* warm sand cream page */\n  --sp-white:    #FFFFFF;\n\n  --sp-gold:     #F7B32B;   /* savanna sun gold — LEAD */\n  --sp-gold-dk:  #D98A15;\n  --sp-coral:    #F3936B;   /* terracotta sunset */\n  --sp-coral-dk: #D65B33;\n  --sp-aqua:     #7FC9A6;   /* fresh acacia-leaf mint */\n  --sp-aqua-dk:  #2E9268;\n  --sp-mars:     #E9622C;   /* hot sunset orange */\n  --sp-mars-dk:  #C0431A;\n\n  --sp-violet:   #B5651D;   /* warm amber-brown (numbers, arrows, table heads) */\n  --sp-lav:      #8FB865;   /* acacia green */\n  --sp-lav-soft: #C4DCA0;\n\n  /* tints (soft card fills) */\n  --sp-tint-lav:   #E9F1DA;   /* pale green */\n  --sp-tint-gold:  #FCEEC6;   /* pale sand-gold */\n  --sp-tint-coral: #FBE0D3;   /* pale terracotta */\n  --sp-tint-aqua:  #DCF1E6;   /* pale mint */\n  --sp-tint-mars:  #FBDDC9;   /* pale sunset */\n\n  /* shadows in deep-brown ink */\n  --sp-shadow-pop:  0 14px 0 rgba(60,32,10,.14), 0 26px 50px rgba(60,32,10,.30);\n  --sp-shadow-card: 0 10px 30px rgba(60,32,10,.26);\n  --sp-drop:        0 7px 0 rgba(60,32,10,.26);\n}\n\n/* ============================================================\n   SLIDE SHELLS — warm desert skies (replace the cosmic ones)\n   ============================================================ */\n/* DEEP — title / dividers / closing: dramatic Kalahari sunset */\n.slide.savanna-deep {\n  color:#fff;\n  background:\n    radial-gradient(120% 90% at 50% 118%, #FFD35E 0%, #FFB13C 20%, #F07A2A 46%, #D8511F 70%, #A5371A 100%);\n}\n/* MID — activity slides: soft sunny sky over warm sand */\n.slide.savanna {\n  color:var(--sp-ink);\n  background:\n    radial-gradient(130% 88% at 50% 128%, #F2C97A 0%, #F4D99B 30%, transparent 62%),\n    linear-gradient(180deg, #BFE8EE 0%, #E9F1E0 42%, #F6E7C4 78%, #F0D69C 100%);\n}\n/* CREAM — plain warm page for busy grammar slides */\n.slide.savanna-cream { background:var(--sp-cream); color:var(--sp-ink); }\n\n/* baked sun-dust specks (very subtle, warm) */\n.slide.savanna::before, .slide.savanna-deep::before {\n  content:\"\"; position:absolute; inset:0; z-index:0; pointer-events:none; opacity:.5;\n  background-image:\n    radial-gradient(2px 2px at 14% 30%, rgba(255,255,255,.7), transparent),\n    radial-gradient(2px 2px at 72% 20%, rgba(255,244,214,.7), transparent),\n    radial-gradient(2.5px 2.5px at 40% 72%, rgba(255,255,255,.55), transparent),\n    radial-gradient(2px 2px at 86% 60%, rgba(255,244,214,.55), transparent),\n    radial-gradient(2px 2px at 24% 84%, rgba(255,255,255,.5), transparent);\n}\n.slide.savanna .lead { color:var(--sp-ink); text-shadow:none; }\n.slide.savanna-deep .lead { color:#fff; text-shadow:0 2px 14px rgba(120,50,10,.4); }\n\n/* restyle the reusable star-field script output → floating warm dust motes */\n.slide.savanna .tw.dot, .slide.savanna-deep .tw.dot { background:rgba(255,246,220,.85); }\n.slide.savanna .tw.spark, .slide.savanna-deep .tw.spark { background:var(--sp-gold);\n  clip-path:polygon(50% 0,61% 39%,100% 50%,61% 61%,50% 100%,39% 61%,0 50%,39% 39%); }\n\n/* a warm horizon \"sun\" glow tint override */\n.glow      { background:radial-gradient(circle, rgba(247,179,43,.42) 0%, rgba(247,179,43,0) 66%); }\n.glow.gold { background:radial-gradient(circle, rgba(255,211,94,.55) 0%, rgba(255,211,94,0) 68%); }\n.glow.lav  { background:radial-gradient(circle, rgba(143,184,101,.40) 0%, rgba(143,184,101,0) 66%); }\n.glow.mars { background:radial-gradient(circle, rgba(233,98,44,.42) 0%, rgba(233,98,44,0) 66%); }\n.orbit { border-color:rgba(255,255,255,.28); }\n\n/* big display colours for hero words */\n.pd-c-sand  { color:#FBE7C0; }\n.pd-c-gold  { color:var(--sp-gold); }\n.pd-c-white { color:#fff; }\n.pd-c-green { color:#BFE08A; }\n.pd-c-sun   { color:#FFE08A; }\n.ink-stroke { -webkit-text-stroke:5px var(--sp-ink); paint-order:stroke fill; }\n\n/* the eyebrow inherits new palette; add a green variant */\n.eyebrow.green { background:var(--sp-lav); color:var(--sp-ink); }\n.eyebrow.sun   { background:var(--sp-gold); color:var(--sp-ink); }\n\n/* ============================================================\n   GRAMMAR COLOUR CODES — Lesson 9\n   present perfect = green · past perfect = plum ·\n   conjunction = sunset orange · main clause = teal-blue ·\n   subordinate clause = amber-brown · relative clause = rose ·\n   comma = teal\n   ============================================================ */\n.g-pp    { color:#2E7D52; font-weight:700; }   /* present perfect */\n.g-pastp { color:#7A4FB0; font-weight:700; }   /* past perfect */\n.g-conj  { color:var(--sp-mars-dk); font-weight:700; }  /* conjunctions */\n.g-main  { color:#2A7DA6; font-weight:700; }   /* main clause */\n.g-sub   { color:#B5651D; font-weight:700; }   /* subordinate clause */\n.g-rel   { color:#C13E6A; font-weight:700; }   /* relative clause */\n.g-comma { color:#2E9268; font-weight:700; }   /* commas */\n.g-fact  { color:var(--sp-gold-dk); font-weight:700; }  /* key fact word */\n\n/* highlight runs in the article */\n.hl-pp    { color:#1c5e3a; background:#D6F0DF; box-shadow:0 0 0 2px #9BD9B4 inset; }\n.hl-pastp { color:#4a2a7a; background:#EBE1FA; box-shadow:0 0 0 2px #CBB6F0 inset; }\n.hl-conj  { color:#9a3410; background:var(--sp-tint-mars); box-shadow:0 0 0 2px #F4B58F inset; }\n.hl-sub   { color:#7a4413; background:var(--sp-tint-gold);  box-shadow:0 0 0 2px #EBC988 inset; }\n.hl-rel   { color:#9a2b52; background:#FBDCE7; box-shadow:0 0 0 2px #F2AEC6 inset; }\n.hl-key   { color:#7a4413; background:#FDE7B3; box-shadow:0 0 0 2px #F4C766 inset; }\n\n/* inserted-comma / apostrophe chip */\n.cma { display:inline-block; color:#1c6b49; background:var(--sp-tint-aqua);\n  border:3px solid #2E9268; border-radius:8px; padding:0 .28em; margin:0 .04em;\n  font-weight:800; line-height:1; box-shadow:0 3px 0 rgba(60,32,10,.18); transform:translateY(-1px); }\n\n/* small label pill used on teach cards */\n.owner-tag { display:inline-flex; align-items:center; gap:9px;\n  font-family:var(--pd-font-display); font-weight:700; font-size:23px; letter-spacing:.03em;\n  text-transform:uppercase; color:var(--sp-ink); background:#fff;\n  border:4px solid var(--sp-ink); border-radius:999px; padding:6px 20px; box-shadow:var(--sp-drop); }\n\n/* before → after transform row for teach cards */\n.trans { display:flex; align-items:center; gap:18px; flex-wrap:wrap; }\n.trans .from { font-size:24px; font-weight:600; color:var(--sp-ink-soft); font-style:italic; }\n.trans .to   { font-size:26px; font-weight:700; color:var(--sp-ink); }\n.trans .ar   { font-family:var(--pd-font-display); font-size:30px; color:var(--sp-violet); }\n\n/* ============================================================\n   ⚡ FIELD CHALLENGE — re-skin lesson6's .mission for the article\n   ============================================================ */\n.mission { background:var(--sp-tint-gold); }\n.mission .mtag { background:var(--sp-mars); }\n.mission .mtag::before { content:\"\"; }\n\n/* ============================================================\n   SUBHEADING chip inside the article (models \"text features\")\n   ============================================================ */\n.subhead { display:inline-flex; align-items:center; gap:12px;\n  font-family:var(--pd-font-display); font-weight:700; font-size:30px; color:#fff;\n  background:var(--sp-aqua-dk); border:4px solid var(--sp-ink); border-radius:16px;\n  padding:8px 22px; box-shadow:var(--sp-drop); transform:rotate(-1deg); }\n.subhead.gold { background:var(--sp-gold-dk); }\n.subhead.mars { background:var(--sp-mars); }\n.subhead.green{ background:var(--sp-aqua-dk); }\n\n/* photo frame — chunky white polaroid for the real meerkat photos */\n.photo { display:block; border:6px solid #fff; border-radius:22px;\n  box-shadow:var(--sp-shadow-pop); object-fit:cover; background:#fff; }\n.photo-cap { display:block; font-family:var(--pd-font-body); font-weight:700; font-size:20px;\n  color:var(--sp-ink); text-align:center; margin-top:12px; }\n\n/* ============================================================\n   AFRICA MAP — spotlight the 3 Kalahari countries\n   ============================================================ */\n.mapwrap { position:relative; display:inline-block; border:6px solid var(--sp-ink);\n  border-radius:26px; overflow:hidden; box-shadow:var(--sp-shadow-pop); background:#DCEFF4; }\n.mapwrap img { display:block; width:100%; height:100%; }\n/* dim veil so highlights pop */\n.mapwrap .veil { position:absolute; inset:0; background:rgba(74,42,18,.10); pointer-events:none; }\n/* a glowing ring pinned over a country (positioned by left/top %) */\n.pin { position:absolute; transform:translate(-50%,-50%); z-index:3; }\n.pin .ring { width:118px; height:118px; border-radius:50%;\n  border:7px solid var(--sp-gold); background:rgba(247,179,43,.22);\n  box-shadow:0 0 0 6px rgba(255,255,255,.5), 0 0 34px 8px rgba(247,179,43,.75);\n  animation:kal-pulse 2.4s ease-in-out infinite; }\n.pin .ring.thin { border-width:4px; background:rgba(247,179,43,.14);\n  box-shadow:0 0 0 3px rgba(255,255,255,.45), 0 0 26px 5px rgba(247,179,43,.7); }\n.pin .plabel { position:absolute; left:50%; transform:translateX(-50%);\n  font-family:var(--pd-font-display); font-weight:700; font-size:24px; white-space:nowrap;\n  color:var(--sp-ink); background:var(--sp-gold); border:4px solid var(--sp-ink);\n  border-radius:999px; padding:5px 18px; box-shadow:var(--sp-drop); }\n.pin .plabel.below { top:78px; }\n.pin .plabel.above { bottom:78px; }\n/* numbered country marker (matches the key roundels) */\n.mapnum { width:38px; height:38px; border-radius:50%; display:grid; place-items:center;\n  font-family:var(--pd-font-display); font-weight:700; font-size:20px; color:var(--sp-ink);\n  background:radial-gradient(circle at 36% 28%, color-mix(in srgb, var(--badge,var(--sp-gold)) 62%, #fff) 0 14%, var(--badge,var(--sp-gold)) 52%, color-mix(in srgb, var(--badge,var(--sp-gold)) 72%, var(--sp-ink)) 100%);\n  border:3px solid var(--sp-ink); box-shadow:0 3px 0 rgba(60,32,10,.35), 0 0 0 3px rgba(255,255,255,.7);\n  animation:kal-pulse 2.4s ease-in-out infinite; }\n@keyframes kal-pulse { 0%,100% { transform:scale(1); opacity:.95; } 50% { transform:scale(1.12); opacity:.7; } }\n@media (prefers-reduced-motion: reduce) { .pin .ring { animation:none; } }\n\n/* legend dot for grammar keys */\n.keydot { display:inline-flex; align-items:center; gap:10px; font-size:22px; font-weight:700;\n  color:var(--sp-ink); }\n.keydot i { width:24px; height:24px; border-radius:7px; border:3px solid var(--sp-ink); display:inline-block; }\n\n/* flying birds — gentle looping soar for decorative bird PNGs */\n@keyframes kal-soar {\n  0%   { transform:translate(0,0) rotate(0deg); }\n  25%  { transform:translate(90px,-26px) rotate(-3deg); }\n  50%  { transform:translate(190px,10px) rotate(2deg); }\n  75%  { transform:translate(90px,30px) rotate(-2deg); }\n  100% { transform:translate(0,0) rotate(0deg); }\n}\n.kbird { animation:kal-soar 11s ease-in-out infinite; }\n@media (prefers-reduced-motion: reduce) { .kbird { animation:none; } }\n\n/* motif drop-shadow warm */\n.slide.savanna .motif, .slide.savanna-deep .motif, .slide.savanna-cream .motif {\n  filter:drop-shadow(0 12px 16px rgba(90,45,12,.35)); }\n\n/* cream-slide lead colour */\n.slide.savanna-cream .lead { color:var(--sp-ink); }\n<\u002Fstyle>\n<style>\n  html, body { margin:0; height:100%; }\n  body {\n    font-family:var(--pd-font-body); color:var(--sp-ink);\n    background:\n      radial-gradient(130% 80% at 50% 118%, #F2C97A 0%, #F4D99B 30%, transparent 62%),\n      linear-gradient(180deg, #BFE8EE 0%, #E9F1E0 42%, #F6E7C4 78%, #F0D69C 100%);\n    min-height:100vh; display:flex; flex-direction:column; align-items:center;\n    -webkit-font-smoothing:antialiased; overflow-x:hidden;\n  }\n  /* subtle sun dust */\n  body::before { content:\"\"; position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.5;\n    background-image:\n      radial-gradient(2px 2px at 14% 24%, rgba(255,255,255,.7), transparent),\n      radial-gradient(2px 2px at 78% 16%, rgba(255,244,214,.7), transparent),\n      radial-gradient(2.5px 2.5px at 42% 70%, rgba(255,255,255,.5), transparent),\n      radial-gradient(2px 2px at 88% 56%, rgba(255,244,214,.5), transparent); }\n\n  .wrap { position:relative; z-index:2; width:min(1120px, 94vw); padding:26px 0 60px; }\n\n  /* header */\n  .top { display:flex; align-items:center; justify-content:space-between; gap:18px; flex-wrap:wrap; margin-bottom:18px; }\n  .brand { display:flex; align-items:center; gap:16px; }\n  .brand h1 { font-family:var(--pd-font-display); font-weight:800; font-size:44px; line-height:1; margin:0; color:var(--sp-ink);\n    letter-spacing:.01em; }\n  .brand .sub { font-weight:700; font-size:18px; color:var(--sp-ink-soft); margin-top:6px; }\n  .scorebox { display:flex; gap:12px; }\n  .stat { background:#fff; border:4px solid var(--sp-ink); border-radius:18px; box-shadow:var(--sp-drop);\n    padding:8px 20px; text-align:center; min-width:90px; }\n  .stat b { display:block; font-family:var(--pd-font-display); font-size:32px; line-height:1; color:var(--sp-mars-dk); }\n  .stat span { font-weight:700; font-size:15px; text-transform:uppercase; letter-spacing:.04em; color:var(--sp-ink-soft); }\n\n  /* main board */\n  .board { display:grid; grid-template-columns:340px 1fr; gap:26px; align-items:stretch; }\n  @media (max-width:1040px){ .board { grid-template-columns:1fr; } .mkstage { flex-direction:row; align-items:center; justify-content:space-around; } .mkimg{ height:220px; } }\n\n  .panel { position:relative; background:#fff; border:6px solid var(--sp-ink); border-radius:32px;\n    box-shadow:var(--sp-shadow-pop); padding:24px; }\n\n  /* left: meerkat + plate */\n  .mkstage { display:flex; flex-direction:column; align-items:center; text-align:center; background:linear-gradient(180deg,#FDF3DB,#FBE7C0);\n    justify-content:space-between; }\n  .mkimg { width:210px; height:270px; object-fit:contain; margin-top:4px;\n    filter:drop-shadow(0 12px 16px rgba(90,45,12,.30)); transition:transform .2s ease; }\n  .mkspeech { font-family:var(--pd-font-display); font-weight:700; font-size:22px; color:var(--sp-ink);\n    background:#fff; border:4px solid var(--sp-ink); border-radius:16px; padding:8px 18px; box-shadow:var(--sp-drop);\n    min-height:1em; margin-bottom:6px; }\n  .plate-label { font-weight:800; font-size:16px; text-transform:uppercase; letter-spacing:.05em; color:var(--sp-ink-soft); margin:12px 0 6px; }\n  .plate { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }\n  .snack { font-size:30px; line-height:1; transition:transform .3s ease, opacity .3s ease; }\n  .snack.eaten { opacity:.16; transform:scale(.6) rotate(-25deg); }\n\n  /* right: word + keyboard */\n  .clue { font-weight:700; font-size:22px; color:var(--sp-ink); background:var(--sp-tint-gold);\n    border:4px solid var(--sp-ink); border-radius:16px; padding:12px 20px; box-shadow:var(--sp-drop); }\n  .clue b { font-family:var(--pd-font-display); color:var(--sp-mars-dk); }\n\n  .word { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin:26px 0 24px; }\n  .tile { width:52px; height:64px; border-bottom:7px solid var(--sp-ink); display:grid; place-items:center;\n    font-family:var(--pd-font-display); font-weight:800; font-size:40px; color:var(--sp-ink); }\n  .tile.space { border:none; width:22px; }\n  .tile.reveal { animation:pop .3s cubic-bezier(.34,1.56,.64,1) both; }\n  @keyframes pop { 0%{ transform:scale(.4) translateY(10px); opacity:0;} 100%{ transform:scale(1) translateY(0); opacity:1;} }\n\n  .keyboard { display:flex; flex-direction:column; gap:9px; align-items:center; }\n  .krow { display:flex; gap:9px; justify-content:center; }\n  .key { width:60px; height:60px; border:4px solid var(--sp-ink); border-radius:14px; background:#fff;\n    font-family:var(--pd-font-display); font-weight:700; font-size:26px; color:var(--sp-ink); cursor:pointer;\n    box-shadow:0 5px 0 var(--sp-ink); transition:transform .08s ease, box-shadow .08s ease; }\n  .key:hover:not(:disabled){ transform:translateY(-2px); box-shadow:0 7px 0 var(--sp-ink); }\n  .key:active:not(:disabled){ transform:translateY(4px); box-shadow:0 1px 0 var(--sp-ink); }\n  .key.right { background:var(--sp-aqua); color:var(--sp-ink); box-shadow:0 5px 0 var(--sp-aqua-dk); border-color:var(--sp-aqua-dk); cursor:default; }\n  .key.wrong { background:var(--sp-coral); box-shadow:0 5px 0 var(--sp-coral-dk); border-color:var(--sp-coral-dk); color:#fff; cursor:default; opacity:.85; }\n  .key:disabled { cursor:default; }\n  @media (max-width:620px){ .key{ width:44px; height:52px; font-size:20px;} .tile{ width:40px; height:52px; font-size:30px;} .mkstage{ flex-direction:column; } }\n\n  /* banner overlay */\n  .banner { position:absolute; inset:0; z-index:10; display:none; place-items:center; border-radius:26px;\n    background:rgba(74,42,18,.55); backdrop-filter:blur(2px); }\n  .banner.show { display:grid; animation:fade .2s ease both; }\n  @keyframes fade { from{opacity:0;} to{opacity:1;} }\n  .card-msg { background:#fff; border:6px solid var(--sp-ink); border-radius:28px; box-shadow:var(--sp-shadow-pop);\n    padding:30px 40px; text-align:center; max-width:440px; }\n  .card-msg h2 { font-family:var(--pd-font-display); font-weight:800; font-size:44px; margin:0; line-height:1.05; }\n  .card-msg h2.win { color:var(--sp-aqua-dk); }\n  .card-msg h2.lose { color:var(--sp-mars-dk); }\n  .card-msg p { font-size:22px; font-weight:700; margin:14px 0 0; color:var(--sp-ink); }\n  .card-msg .ans { font-family:var(--pd-font-display); color:var(--sp-mars-dk); letter-spacing:.04em; }\n\n  .btnrow { display:flex; gap:14px; justify-content:center; margin-top:22px; flex-wrap:wrap; }\n  .pd-btn { text-decoration:none; }\n  .backlink { position:relative; z-index:2; margin-top:26px; font-weight:700; font-size:18px; }\n  .backlink a { color:var(--sp-mars-dk); text-decoration:none; border-bottom:3px dotted var(--sp-mars-dk); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"wrap\">\n  <div class=\"top\">\n    <div class=\"brand\">\n      <div style=\"font-size:56px; line-height:1;\">🦫<\u002Fdiv>\n      <div>\n        <h1>Feed the Meerkat<\u002Fh1>\n        <div class=\"sub\">Guess the word — but every wrong letter feeds the hungry meerkat! 🦂<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"scorebox\">\n      <div class=\"stat\"><b id=\"streak\">0<\u002Fb><span>Streak<\u002Fspan><\u002Fdiv>\n      <div class=\"stat\"><b id=\"solved\">0<\u002Fb><span>Solved<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"board\">\n    <!-- LEFT -->\n    <div class=\"panel mkstage\">\n      <div>\n        <div class=\"mkspeech\" id=\"speech\">I'm hungry! 🦫<\u002Fdiv>\n        <img class=\"mkimg\" id=\"mkimg\" src=\"b02eb7ad-db53-45fb-af21-5182e97612b6\" alt=\"Meerkat\">\n      <\u002Fdiv>\n      <div>\n        <div class=\"plate-label\">Snacks left · <span id=\"livesnum\">6<\u002Fspan><\u002Fdiv>\n        <div class=\"plate\" id=\"plate\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- RIGHT -->\n    <div class=\"panel\" style=\"display:flex; flex-direction:column;\">\n      <div class=\"clue\">🔍 Clue: <span id=\"clue\">…<\u002Fspan><\u002Fdiv>\n      <div class=\"word\" id=\"word\"><\u002Fdiv>\n      <div class=\"keyboard\" id=\"keyboard\"><\u002Fdiv>\n      <div class=\"banner\" id=\"banner\">\n        <div class=\"card-msg\">\n          <h2 id=\"msgTitle\" class=\"win\">Solved!<\u002Fh2>\n          <p id=\"msgBody\">The word was <span class=\"ans\" id=\"msgAns\"><\u002Fspan><\u002Fp>\n          <div class=\"btnrow\">\n            <button class=\"pd-btn pd-btn--mint\" id=\"nextBtn\">▶ Next word<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"backlink\">🏜️ <a href=\"index.html\">Back to Lesson 9<\u002Fa><\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n(function(){\n  var WORDS = [\n    { w:\"MEERKAT\",   c:\"A small desert animal that stands tall on lookout.\" },\n    { w:\"MONGOOSE\",  c:\"The animal family that meerkats belong to.\" },\n    { w:\"SENTINEL\",  c:\"A meerkat on guard duty, watching for danger.\" },\n    { w:\"BURROW\",    c:\"The underground home a mob digs to hide in.\" },\n    { w:\"KALAHARI\",  c:\"The vast, dry desert where meerkats live.\" },\n    { w:\"SCORPION\",  c:\"A stinging mini-beast a meerkat can safely eat.\" },\n    { w:\"PREDATOR\",  c:\"An animal that hunts others, like an eagle or snake.\" },\n    { w:\"FORAGE\",    c:\"To wander about searching for food.\" },\n    { w:\"BOTSWANA\",  c:\"One of the three Kalahari countries.\" },\n    { w:\"NAMIBIA\",   c:\"A Kalahari country right next to Botswana.\" },\n    { w:\"ADAPTED\",   c:\"Changed over time to survive somewhere hard.\" },\n    { w:\"EAGLE\",     c:\"A sharp-eyed bird of prey meerkats watch the sky for.\" },\n    { w:\"DESERT\",    c:\"A very dry place where little rain falls.\" },\n    { w:\"TEAMWORK\",  c:\"Working together — the meerkat's superpower.\" }\n  ];\n  var MAX = 6;\n  var SNACK = \"🦂\";\n  var alphabet = \"ABCDEFGHIJKLMNOPQRSTUVWXYZ\".split(\"\");\n  var rows = [\"QWERTYUIOP\",\"ASDFGHJKL\",\"ZXCVBNM\"];\n\n  var state = { word:\"\", clue:\"\", guessed:{}, wrong:0, over:false };\n  var order = [], oi = 0;\n\n  var elWord = document.getElementById('word');\n  var elKb = document.getElementById('keyboard');\n  var elClue = document.getElementById('clue');\n  var elPlate = document.getElementById('plate');\n  var elLives = document.getElementById('livesnum');\n  var elSpeech = document.getElementById('speech');\n  var elImg = document.getElementById('mkimg');\n  var elBanner = document.getElementById('banner');\n  var elStreak = document.getElementById('streak');\n  var elSolved = document.getElementById('solved');\n\n  var store = { streak:0, solved:0 };\n  try {\n    var s = JSON.parse(localStorage.getItem('feedMeerkat')||'{}');\n    if(typeof s.streak==='number') store.streak=s.streak;\n    if(typeof s.solved==='number') store.solved=s.solved;\n  } catch(e){}\n  function save(){ try{ localStorage.setItem('feedMeerkat', JSON.stringify(store)); }catch(e){} }\n  function paintScore(){ elStreak.textContent=store.streak; elSolved.textContent=store.solved; }\n\n  function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }\n\n  function nextWord(){\n    if(oi>=order.length){ order=shuffle(WORDS.map(function(_,i){return i;})); oi=0; }\n    var item = WORDS[order[oi++]];\n    state = { word:item.w, clue:item.c, guessed:{}, wrong:0, over:false };\n    elClue.textContent = item.c;\n    elBanner.classList.remove('show');\n    speak(\"I'm hungry! 🦫\");\n    setImg('kalahari/meer-hero.png');\n    buildWord(); buildPlate(); buildKeys();\n  }\n\n  function buildWord(){\n    elWord.innerHTML='';\n    state.word.split('').forEach(function(ch){\n      var t=document.createElement('div');\n      if(ch===' '){ t.className='tile space'; }\n      else { t.className='tile'; t.dataset.ch=ch; t.textContent=''; }\n      elWord.appendChild(t);\n    });\n  }\n\n  function buildPlate(){\n    elPlate.innerHTML='';\n    for(var i=0;i<MAX;i++){\n      var s=document.createElement('span'); s.className='snack'; s.textContent=SNACK;\n      elPlate.appendChild(s);\n    }\n    elLives.textContent=MAX;\n  }\n\n  function buildKeys(){\n    elKb.innerHTML='';\n    rows.forEach(function(r){\n      var rowEl=document.createElement('div'); rowEl.className='krow';\n      r.split('').forEach(function(letter){\n        var b=document.createElement('button'); b.className='key'; b.textContent=letter; b.dataset.k=letter;\n        b.addEventListener('click', function(){ guess(letter); });\n        rowEl.appendChild(b);\n      });\n      elKb.appendChild(rowEl);\n    });\n  }\n\n  function speak(t){ elSpeech.textContent=t; }\n  function setImg(src){ if(elImg.getAttribute('src')!==src){ elImg.src=src; } }\n\n  var HAPPY=[\"Yum, a good guess! 😋\",\"Keep going! 🐾\",\"You're doing great! ⭐\",\"Nice one! 🌟\"];\n  var OOPS=[\"Ooh, a snack! 🦂\",\"Munch munch… 😬\",\"Careful now! 😮\",\"That fills me up! 🍽️\"];\n\n  function guess(letter){\n    if(state.over || state.guessed[letter]) return;\n    state.guessed[letter]=true;\n    var key=elKb.querySelector('[data-k=\"'+letter+'\"]');\n    if(state.word.indexOf(letter)>=0){\n      if(key){ key.classList.add('right'); key.disabled=true; }\n      revealLetter(letter);\n      speak(HAPPY[Math.floor(Math.random()*HAPPY.length)]);\n      checkWin();\n    } else {\n      if(key){ key.classList.add('wrong'); key.disabled=true; }\n      state.wrong++;\n      var left = MAX - state.wrong;\n      elLives.textContent = left;\n      var snacks = elPlate.querySelectorAll('.snack');\n      if(snacks[state.wrong-1]) snacks[state.wrong-1].classList.add('eaten');\n      speak(OOPS[Math.floor(Math.random()*OOPS.length)]);\n      // meerkat looks progressively fuller\n      if(left<=1) setImg('kalahari/meer-sad.png');\n      else if(left<=3) setImg('kalahari/meer-lookup.png');\n      if(state.wrong>=MAX) lose();\n    }\n  }\n\n  function revealLetter(letter){\n    var tiles=elWord.querySelectorAll('.tile');\n    tiles.forEach(function(t){\n      if(t.dataset.ch===letter){ t.textContent=letter; t.classList.add('reveal'); }\n    });\n  }\n\n  function allRevealed(){\n    var tiles=elWord.querySelectorAll('.tile:not(.space)');\n    for(var i=0;i<tiles.length;i++){ if(!tiles[i].textContent) return false; }\n    return true;\n  }\n\n  function checkWin(){ if(allRevealed()) win(); }\n\n  function win(){\n    state.over=true;\n    store.streak++; store.solved++; save(); paintScore();\n    setImg('kalahari/meer-cheer.png');\n    speak(\"Woohoo! 🎉\");\n    showBanner(true);\n  }\n  function lose(){\n    state.over=true;\n    store.streak=0; save(); paintScore();\n    setImg('kalahari/meer-rest.png');\n    speak(\"Too full… zzz 😴\");\n    // reveal the answer\n    var tiles=elWord.querySelectorAll('.tile');\n    var i=0;\n    state.word.split('').forEach(function(ch){\n      var t=tiles[i++]; if(ch!==' '){ t.textContent=ch; t.style.borderBottomColor='var(--sp-mars)'; }\n    });\n    showBanner(false);\n  }\n\n  function showBanner(didWin){\n    document.getElementById('msgTitle').textContent = didWin ? \"Solved! 🎉\" : \"Stuffed! 😴\";\n    document.getElementById('msgTitle').className = didWin ? \"win\" : \"lose\";\n    document.getElementById('msgBody').innerHTML = didWin\n      ? 'The meerkat stayed hungry and you cracked <span class=\"ans\">'+state.word+'<\u002Fspan>!'\n      : 'The meerkat got too full. The word was <span class=\"ans\">'+state.word+'<\u002Fspan>';\n    elBanner.classList.add('show');\n  }\n\n  document.getElementById('nextBtn').addEventListener('click', nextWord);\n  document.addEventListener('keydown', function(e){\n    var k=e.key.toUpperCase();\n    if(state.over && (e.key==='Enter'||e.key===' ')){ e.preventDefault(); nextWord(); return; }\n    if(k.length===1 && k>='A' && k<='Z'){ guess(k); }\n  });\n\n  paintScore();\n  order=shuffle(WORDS.map(function(_,i){return i;}));\n  nextWord();\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
