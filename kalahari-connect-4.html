  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"en-GB\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Kalahari Connect 4 🦫<\u002Ftitle>\n<style>\n@font-face { font-family:'Bowlby One SC'; src:url(\"f9bf15d9-9f87-4632-98ad-290e105eaf82\") format('truetype'); font-weight:400; font-display:swap; }\n@font-face { font-family:'Quicksand'; src:url(\"fe5c52a9-2c80-41ea-8b10-e57e8c57b92e\") format('truetype'); font-weight:500; font-display:swap; }\n@font-face { font-family:'Quicksand'; src:url(\"97d58e1b-6270-49d6-9ed4-adbeb77d05eb\") format('truetype'); font-weight:700; font-display:swap; }\n\n:root{\n  --sand:#E8C88A; --sand-dk:#C89A54; --brown:#4A2A12; --brown-dk:#33200E; --ink:#4A2A12;\n  --gold:#F7B32B; --gold-dk:#D98A15; --white:#fff;\n  --you:#F0A030; --you-dk:#B5651D; --cpu:#B5372A; --cpu-dk:#7C2318;\n  --disp:'Bowlby One SC','Arial Black',sans-serif; --body:'Quicksand','Trebuchet MS',sans-serif;\n}\n*{box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation;}\nhtml,body{margin:0; height:100%; font-family:var(--body); user-select:none; overflow:hidden;\n  background:\n    radial-gradient(130% 80% at 50% 122%, #F2C97A 0%, #F4D99B 26%, transparent 60%),\n    linear-gradient(180deg, #BFE8EE 0%, #E9F1E0 40%, #F6E7C4 74%, #F0D69C 100%);}\nbutton{font-family:inherit; cursor:pointer;}\n\n/* scenery */\n.scene{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;}\n.scene img{position:absolute; bottom:0;}\n.dunes{width:130%; left:-15%; bottom:-2%; opacity:.9;}\n.acacia{height:34vh; right:2%; bottom:6%; opacity:.9; filter:drop-shadow(0 8px 10px rgba(90,45,12,.25));}\n.baobab{height:26vh; left:2%; bottom:6%; opacity:.85;}\n.bird{position:absolute; height:42px; opacity:.75; animation:glide 18s linear infinite;}\n.b1{top:12%; left:-10%; animation-duration:26s;}\n.b2{top:20%; left:-20%; height:32px; animation-duration:32s; animation-delay:-8s;}\n.b3{top:8%;  left:-30%; height:30px; animation-duration:30s; animation-delay:-16s;}\n@keyframes glide{from{transform:translateX(0)}to{transform:translateX(130vw)}}\n@media (prefers-reduced-motion: reduce){ .bird{animation:none; left:auto; right:10%;} }\n\n#wrap{position:relative; z-index:2; height:100vh; display:flex; flex-direction:column; align-items:center; padding:12px clamp(8px,2vw,30px) 18px;}\n\nheader{display:flex; align-items:center; gap:clamp(10px,2vw,22px); flex-wrap:wrap; justify-content:center; margin-bottom:8px;}\nh1{font-family:var(--disp); color:var(--brown); font-size:clamp(22px,3.3vw,40px); margin:0; text-shadow:0 3px 0 #fff,0 5px 0 rgba(74,42,18,.25); line-height:1;}\nh1 .em{color:var(--cpu);}\n#turn{display:flex; align-items:center; gap:11px; background:#fff; border:4px solid var(--brown); border-radius:999px; padding:8px 22px; box-shadow:0 5px 0 rgba(74,42,18,.28); transition:border-color .2s;}\n#turn .dot{width:26px; height:26px; border-radius:50%; border:3px solid var(--ink); flex:none; display:grid; place-items:center; font-size:15px;}\n#turn .who{font-family:var(--disp); font-size:clamp(15px,2vw,20px); color:var(--brown); line-height:1;}\n#turn.you{border-color:var(--you);} #turn.you .dot{background:var(--you);}\n#turn.cpu{border-color:var(--cpu);} #turn.cpu .dot{background:var(--cpu);}\n.btn{font-family:var(--disp); font-size:16px; color:var(--ink); background:var(--gold); border:4px solid var(--ink); border-radius:14px; padding:10px 22px; box-shadow:0 5px 0 var(--ink); transition:transform .1s, box-shadow .1s;}\n.btn:active{transform:translateY(3px); box-shadow:0 2px 0 var(--ink);}\n\n#stage{flex:1; min-height:0; display:flex; align-items:center; justify-content:center; width:100%;}\n#frame{--cell:clamp(40px,9.4vh,86px); --gap:clamp(6px,1vh,12px);\n  background:linear-gradient(160deg,#F7B32B,#D98A15); border:6px solid var(--brown); border-radius:22px; padding:calc(var(--gap)*1.4); box-shadow:0 12px 0 rgba(74,42,18,.4), inset 0 0 40px rgba(255,255,255,.25);}\n\n#cols{display:grid; grid-template-columns:repeat(7,var(--cell)); gap:var(--gap); margin-bottom:var(--gap);}\n.colbtn{height:calc(var(--cell)*0.62); border:4px solid var(--ink); border-radius:12px; background:#fff5df;\n  font-family:var(--disp); font-size:calc(var(--cell)*0.42); color:var(--ink); display:grid; place-items:center; line-height:1;\n  box-shadow:0 4px 0 var(--ink); transition:transform .08s, box-shadow .08s, background .15s;}\n.colbtn:hover:not(:disabled){background:#FFE9AE; transform:translateY(-2px); box-shadow:0 6px 0 var(--ink);}\n.colbtn:active:not(:disabled){transform:translateY(3px); box-shadow:0 1px 0 var(--ink);}\n.colbtn:disabled{background:#cdb98f; color:#8a7a58; cursor:not-allowed; box-shadow:0 4px 0 #9c8659;}\n\n#board{display:grid; grid-template-columns:repeat(7,var(--cell)); grid-auto-rows:var(--cell); gap:var(--gap);\n  background:var(--sand); padding:var(--gap); border-radius:16px; border:4px solid var(--sand-dk);}\n.cell{width:var(--cell); height:var(--cell); border-radius:50%; background:#6E4A24;\n  box-shadow:inset 0 4px 8px rgba(0,0,0,.5); position:relative; overflow:hidden;}\n.disc{position:absolute; inset:7%; border-radius:50%; display:grid; place-items:center;\n  border:3px solid rgba(0,0,0,.25); font-size:calc(var(--cell)*0.44);}\n.disc.you{background:radial-gradient(circle at 34% 30%,#ffe0ab,var(--you) 55%,var(--you-dk)); border-color:var(--you-dk);}\n.disc.cpu{background:radial-gradient(circle at 34% 30%,#e88b7a,var(--cpu) 55%,var(--cpu-dk)); border-color:var(--cpu-dk);}\n.disc.drop{animation:drop .5s cubic-bezier(.3,.1,.3,1);}\n@keyframes drop{0%{transform:translateY(calc(-1*var(--d)))}68%{transform:translateY(0)}80%{transform:translateY(-9%)}90%{transform:translateY(0)}95%{transform:translateY(-3%)}100%{transform:translateY(0)}}\n.disc.you::after{content:\"🦫\"; filter:drop-shadow(0 1px 1px rgba(0,0,0,.3));}\n.disc.cpu::after{content:\"🦂\"; filter:drop-shadow(0 1px 1px rgba(0,0,0,.3));}\n.cell.win .disc{animation:winp 0.7s ease-in-out infinite; box-shadow:0 0 0 4px var(--gold),0 0 18px 4px rgba(247,179,43,.9); z-index:2;}\n@keyframes winp{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}\n\n#over{position:fixed; inset:0; z-index:50; display:none; place-items:center; background:rgba(74,42,18,.8); backdrop-filter:blur(3px);}\n#over.show{display:grid; animation:fade .3s ease;}\n@keyframes fade{from{opacity:0}to{opacity:1}}\n.card{background:#fff; border:7px solid var(--ink); border-radius:30px; padding:clamp(26px,4vw,46px); text-align:center; box-shadow:0 16px 0 rgba(74,42,18,.4); max-width:90vw; animation:pop .45s cubic-bezier(.34,1.5,.5,1);}\n@keyframes pop{0%{transform:scale(.7)}100%{transform:scale(1)}}\n.card .ico{font-size:clamp(60px,10vw,110px); line-height:1; animation:bob 1.5s ease-in-out infinite;}\n@keyframes bob{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-12px) rotate(5deg)}}\n.card h2{font-family:var(--disp); font-size:clamp(30px,5vw,52px); margin:6px 0 18px; line-height:1.05;}\n.card h2.you{color:var(--you-dk);} .card h2.cpu{color:var(--cpu-dk);} .card h2.draw{color:var(--ink);}\n.backlink{margin-top:12px; font-family:var(--body); font-weight:700; font-size:15px;}\n.backlink a{color:var(--cpu-dk); text-decoration:none; border-bottom:3px dotted var(--cpu-dk);}\n\n.conf{position:fixed; top:-20px; z-index:60; pointer-events:none; border-radius:2px; animation:fall linear forwards;}\n@keyframes fall{to{transform:translateY(110vh) rotate(720deg); opacity:.9;}}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n<div class=\"scene\">\n  <img class=\"dunes\" src=\"f6c55ba4-0216-4b1e-9cf9-4f2360fb0db8\" alt=\"\">\n  <img class=\"baobab\" src=\"5b9aab70-7946-48a8-9549-a42f491c4477\" alt=\"\">\n  <img class=\"acacia\" src=\"b2eba19d-db4c-4a77-b1d0-9226c3321e67\" alt=\"\">\n  <img class=\"bird b1\" src=\"cc6d06cf-a547-4c89-9766-f67d9cded416\" alt=\"\">\n  <img class=\"bird b2\" src=\"df2a0164-f793-46f6-aed2-9e9e9f18822b\" alt=\"\">\n  <img class=\"bird b3\" src=\"16f36b3f-d111-4864-8907-03947e4ace5a\" alt=\"\">\n<\u002Fdiv>\n\n<div id=\"wrap\">\n  <header>\n    <h1>KALAHARI <span class=\"em\">CONNECT 4<\u002Fspan><\u002Fh1>\n    <div id=\"turn\" class=\"you\"><span class=\"dot\">🦫<\u002Fspan><span class=\"who\">Your turn!<\u002Fspan><\u002Fdiv>\n    <button class=\"btn\" id=\"newBtn\">↺ New Game<\u002Fbutton>\n  <\u002Fheader>\n  <div id=\"stage\">\n    <div id=\"frame\">\n      <div id=\"cols\"><\u002Fdiv>\n      <div id=\"board\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"over\">\n  <div class=\"card\">\n    <div class=\"ico\" id=\"overIco\">🏆<\u002Fdiv>\n    <h2 id=\"overMsg\">You win!<\u002Fh2>\n    <button class=\"btn\" id=\"againBtn\">🦫 Play Again<\u002Fbutton>\n    <div class=\"backlink\">🏜️ <a href=\"index.html\">Back to Lesson 9<\u002Fa><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n(function(){\n  \"use strict\";\n  var COLS=7, ROWS=6, YOU=1, CPU=2;\n  var grid, current, busy, gameOver;\n\n  var colsEl=document.getElementById('cols'),\n      boardEl=document.getElementById('board'),\n      turnEl=document.getElementById('turn'),\n      overEl=document.getElementById('over');\n\n  var AC=null, soundOn=true;\n  function ac(){ if(!AC){ try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){} } if(AC&&AC.state==='suspended'){ try{AC.resume();}catch(e){} } return AC; }\n  function tone(f,d,t,v){ if(!soundOn) return; var c=ac(); if(!c) return; var o=c.createOscillator(),g=c.createGain(); o.type=t||'sine'; o.frequency.value=f; g.gain.setValueAtTime(.0001,c.currentTime); g.gain.exponentialRampToValueAtTime(v||.18,c.currentTime+.02); g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+d); o.connect(g).connect(c.destination); o.start(); o.stop(c.currentTime+d+.02); }\n  function dropSound(){ tone(300,.12,'sine',.16); setTimeout(function(){tone(160,.1,'sine',.12);},90); }\n  function winSound(){ [523,659,784,1047].forEach(function(f,i){ setTimeout(function(){tone(f,.28,'triangle',.22);}, i*110); }); }\n  function loseSound(){ [392,330,262].forEach(function(f,i){ setTimeout(function(){tone(f,.3,'sawtooth',.16);}, i*140); }); }\n\n  function emptyGrid(){ var g=[]; for(var c=0;c<COLS;c++){ g[c]=[]; for(var r=0;r<ROWS;r++) g[c][r]=0; } return g; }\n  function lowestEmpty(g,c){ for(var r=ROWS-1;r>=0;r--) if(g[c][r]===0) return r; return -1; }\n  function validCols(g){ var v=[]; for(var c=0;c<COLS;c++) if(g[c][0]===0) v.push(c); return v; }\n\n  var DIRS=[[1,0],[0,1],[1,1],[1,-1]];\n  function winningCells(g,player){\n    for(var c=0;c<COLS;c++) for(var r=0;r<ROWS;r++){\n      if(g[c][r]!==player) continue;\n      for(var d=0;d<DIRS.length;d++){\n        var dc=DIRS[d][0], dr=DIRS[d][1], cells=[[c,r]], ok=true;\n        for(var k=1;k<4;k++){ var nc=c+dc*k, nr=r+dr*k;\n          if(nc<0||nc>=COLS||nr<0||nr>=ROWS||g[nc][nr]!==player){ ok=false; break; } cells.push([nc,nr]); }\n        if(ok) return cells;\n      }\n    }\n    return null;\n  }\n  function isWin(g,p){ return !!winningCells(g,p); }\n\n  function build(){\n    grid=emptyGrid(); current=YOU; busy=false; gameOver=false;\n    overEl.classList.remove('show');\n    setTurn(YOU);\n    colsEl.innerHTML=''; boardEl.innerHTML='';\n    for(var c=0;c<COLS;c++){\n      (function(col){\n        var b=document.createElement('button'); b.className='colbtn'; b.dataset.col=col; b.textContent='▼';\n        b.setAttribute('aria-label','Drop in column '+(col+1));\n        b.addEventListener('click',function(){ playerMove(col); });\n        colsEl.appendChild(b);\n      })(c);\n    }\n    for(var r=0;r<ROWS;r++) for(var cc=0;cc<COLS;cc++){\n      var cell=document.createElement('div'); cell.className='cell'; cell.dataset.c=cc; cell.dataset.r=r;\n      boardEl.appendChild(cell);\n    }\n  }\n  function cellEl(c,r){ return boardEl.querySelector('.cell[data-c=\"'+c+'\"][data-r=\"'+r+'\"]'); }\n\n  function setTurn(p){\n    turnEl.className = p===YOU?'you':'cpu';\n    turnEl.querySelector('.dot').textContent = p===YOU?'🦫':'🦂';\n    turnEl.querySelector('.who').textContent = p===YOU?'Your turn!':'The Wild…';\n  }\n  function setColsEnabled(on){\n    [].forEach.call(colsEl.children,function(b){\n      var col=+b.dataset.col; b.disabled = !on || grid[col][0]!==0;\n    });\n  }\n\n  function place(col, player, after){\n    var r=lowestEmpty(grid,col); if(r<0) return;\n    grid[col][r]=player;\n    var cell=cellEl(col,r);\n    var disc=document.createElement('div'); disc.className='disc '+(player===YOU?'you':'cpu')+' drop';\n    var cellPx=cell.getBoundingClientRect().height; var gap=parseFloat(getComputedStyle(boardEl).gap)||10;\n    disc.style.setProperty('--d', ((r+1)*(cellPx+gap))+'px');\n    cell.appendChild(disc); dropSound();\n    setTimeout(function(){ disc.classList.remove('drop'); if(after) after(r); },500);\n  }\n\n  function playerMove(col){\n    if(busy||gameOver||grid[col][0]!==0||current!==YOU) return;\n    ac(); busy=true; setColsEnabled(false);\n    place(col,YOU,function(){\n      if(checkEnd(YOU)) return;\n      current=CPU; setTurn(CPU);\n      setTimeout(cpuMove, 520);\n    });\n  }\n\n  function cpuMove(){\n    if(gameOver) return;\n    var col=chooseCpu();\n    place(col,CPU,function(){\n      if(checkEnd(CPU)) return;\n      current=YOU; setTurn(YOU); busy=false; setColsEnabled(true);\n    });\n  }\n\n  function checkEnd(player){\n    var cells=winningCells(grid,player);\n    if(cells){ gameOver=true; busy=true; setColsEnabled(false);\n      cells.forEach(function(p){ cellEl(p[0],p[1]).classList.add('win'); });\n      setTimeout(function(){ showResult(player); }, 700);\n      return true;\n    }\n    if(validCols(grid).length===0){ gameOver=true; setTimeout(function(){ showResult(0); },400); return true; }\n    return false;\n  }\n\n  function copyGrid(g){ return g.map(function(col){ return col.slice(); }); }\n  function tryDrop(g,col,p){ var r=lowestEmpty(g,col); if(r<0) return -1; g[col][r]=p; return r; }\n\n  function chooseCpu(){\n    var valid=validCols(grid);\n    for(var i=0;i<valid.length;i++){ var g=copyGrid(grid); tryDrop(g,valid[i],CPU); if(isWin(g,CPU)) return valid[i]; }\n    for(var j=0;j<valid.length;j++){ var g2=copyGrid(grid); tryDrop(g2,valid[j],YOU); if(isWin(g2,YOU)) return valid[j]; }\n    var safe=[];\n    for(var k=0;k<valid.length;k++){\n      var col=valid[k]; var g3=copyGrid(grid); tryDrop(g3,col,CPU);\n      var givesWin=false; var v2=validCols(g3);\n      for(var m=0;m<v2.length;m++){ var g4=copyGrid(g3); tryDrop(g4,v2[m],YOU); if(isWin(g4,YOU)){ givesWin=true; break; } }\n      if(!givesWin) safe.push(col);\n    }\n    var pool=safe.length?safe:valid;\n    var weights=[1,2,4,6,4,2,1];\n    var best=[], bestScore=-1e9;\n    for(var n=0;n<pool.length;n++){\n      var c=pool[n]; var gg=copyGrid(grid); tryDrop(gg,c,CPU);\n      var s=weights[c];\n      s += countLines(gg,CPU,3)*8 + countLines(gg,CPU,2)*1;\n      s -= countLines(gg,YOU,3)*4;\n      s += Math.random()*0.5;\n      if(s>bestScore){ bestScore=s; best=[c]; } else if(s===bestScore){ best.push(c); }\n    }\n    return best[Math.floor(Math.random()*best.length)];\n  }\n  function countLines(g,p,len){\n    var n=0;\n    for(var c=0;c<COLS;c++) for(var r=0;r<ROWS;r++){\n      for(var d=0;d<DIRS.length;d++){\n        var dc=DIRS[d][0], dr=DIRS[d][1], cnt=0, ok=true;\n        for(var k=0;k<4;k++){ var nc=c+dc*k, nr=r+dr*k;\n          if(nc<0||nc>=COLS||nr<0||nr>=ROWS){ ok=false; break; }\n          var v=g[nc][nr]; if(v===p) cnt++; else if(v!==0){ ok=false; break; } }\n        if(ok && cnt===len) n++;\n      }\n    }\n    return n;\n  }\n\n  function showResult(player){\n    var ico=document.getElementById('overIco'), msg=document.getElementById('overMsg');\n    if(player===YOU){ ico.textContent='🦫'; msg.textContent='THE MOB WINS!'; msg.className='you'; winSound(); confetti(); }\n    else if(player===CPU){ ico.textContent='🦂'; msg.textContent='The Wild wins!'; msg.className='cpu'; loseSound(); }\n    else { ico.textContent='🤝'; msg.textContent=\"It's a draw!\"; msg.className='draw'; tone(440,.2,'sine',.15); }\n    overEl.classList.add('show');\n  }\n  function confetti(){\n    var cols=['#F7B32B','#F0A030','#B5372A','#fff','#8FB865','#E9622C'];\n    for(var i=0;i<90;i++){ var d=document.createElement('div'); d.className='conf';\n      var s=7+Math.random()*9; d.style.width=s+'px'; d.style.height=(s*0.5)+'px';\n      d.style.left=Math.random()*100+'vw'; d.style.background=cols[i%cols.length];\n      d.style.animationDuration=(2.4+Math.random()*2)+'s'; d.style.animationDelay=(Math.random()*0.6)+'s';\n      if(Math.random()<.5) d.style.borderRadius='50%';\n      document.body.appendChild(d); (function(el){setTimeout(function(){el.remove();},5200);})(d);\n    }\n  }\n\n  document.getElementById('newBtn').addEventListener('click',function(){ build(); setColsEnabled(true); });\n  document.getElementById('againBtn').addEventListener('click',function(){ build(); setColsEnabled(true); });\n\n  build(); setColsEnabled(true);\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
